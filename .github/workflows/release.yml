name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Smoke test CLI help
        run: bun run dev:cli -- --help

  release:
    name: Create Release
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes

  binaries:
    name: Build ${{ matrix.asset }}
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: atlassian-linux-x64
          - target: bun-linux-arm64
            asset: atlassian-linux-arm64
          - target: bun-darwin-x64
            asset: atlassian-darwin-x64
          - target: bun-darwin-arm64
            asset: atlassian-darwin-arm64
          - target: bun-windows-x64
            asset: atlassian-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        working-directory: packages/cli
        run: |
          bun build ./src/bin.ts \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --outfile ./dist/${{ matrix.asset }}

      - name: Generate checksum
        working-directory: packages/cli/dist
        run: shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            packages/cli/dist/${{ matrix.asset }}
            packages/cli/dist/${{ matrix.asset }}.sha256
          fail_on_unmatched_files: true

  checksums:
    name: Aggregate Checksums
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          mkdir -p release-assets
          cd release-assets
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.sha256"
          cat *.sha256 | sort > SHASUMS256.txt

      - name: Upload aggregate checksum file
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/SHASUMS256.txt
